group:
  - name: All
    repos: |
      Orbitary/Bits
      Orbitary/PacketNinja
      Orbitary/Docs
      Orbitary/Notion-SDK-Java
    files:
      # ── IDE ────────────────────────────────────────────────────
      - source: .idea/copyright
      - source: .idea/codeStyles
      - source: .idea/inspectionProfiles
      - source: .editorconfig

      # ── Git ────────────────────────────────────────────────────
      - source: .gitignore     # TODO: Have specific .gitignores for each type of project
      - source: .gitattributes

      # ── Misc ────────────────────────────────────────────────────
      - source: LICENSE
        replace: false
      - source: libs
      - source: renovate.json
        replace: false

  - name: Java
    repos: |
      Orbitary/Bits
      Orbitary/PacketNinja
    files:
      # ── Gradle Wrapper ─────────────────────────────────────────
      - source: gradle/wrapper/gradle-wrapper.properties
      - source: gradle/wrapper/gradle-wrapper.jar
      - source: gradlew
      - source: gradlew.bat
      - source: template/gradle.properties.template
        dest: gradle.properties
        replace: false
      - source: template/settings.gradle.kts.template
        dest: settings.gradle.kts
        replace: false
      - source: template/build.gradle.kts.template
        dest: build.gradle.kts
        replace: false

      # ── Misc ────────────────────────────────────────────────────
      - source: template/package-info.template

  - name: Node
    repos: |
      Orbitary/Docs
    files: [ ]
